# Pyruns Workspace Settings
# Auto-generated on first launch. Edit freely.
# Delete this file to reset all values to defaults.

# Server
ui_port: 8099

# Header
header_refresh_interval: 3

# Generator
generator_form_columns: 3          # parameter editor columns (1-9)
generator_auto_timestamp: True
generator_mode: form               # script workspace only: form | yaml

# Manager
manager_columns: 5
manager_max_workers: 1
manager_execution_mode: thread     # thread | process
ui_page_size: 50                   # cards per page (0 = show all)

# Monitor
monitor_chunk_size: 50000            # bytes per chunk
monitor_scrollback: 100000           # max lines in history
monitor_sidebar_width_pct: 15     # monitor sidebar width (% of page)

# Logging
log_enabled: False
log_level: INFO                    # DEBUG | INFO | WARNING | ERROR | CRITICAL

# Shell
shell_mode: follow                  # follow | custom
shell_executable: 

