name: Python application

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

permissions:
  contents: read

jobs:
  python:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: [ "3.10", "3.11", "3.12", "3.13" ]

    steps:
    - uses: actions/checkout@v4
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -e ".[test,lint]"
    - name: Lint with flake8
      run: |
        flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics
        flake8 . --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics
    - name: Test with pytest
      run: pytest

  windows-shell:
    runs-on: windows-latest

    steps:
    - uses: actions/checkout@v4
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.11"
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -e ".[test]"
    - name: Test shell examples on Windows
      run: pytest tests/test_examples.py -q

  frontend:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.11"
    - name: Set up Node
      uses: actions/setup-node@v4
      with:
        node-version: 24
    - name: Print frontend tool versions
      run: |
        node --version
        npm --version
        python --version
    - name: Install frontend dependencies
      run: npm --prefix frontend ci
    - name: Check frontend static assets
      run: python scripts/check_frontend_static.py
    - name: Build frontend
      run: npm run frontend:build
    - name: Build docs
      run: |
        npm ci
        npm run docs:build

  package:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.10"
    - name: Build wheel and smoke installed app
      run: |
        python -m pip install --upgrade pip build
        rm -rf build .tmp-dist
        python -m build --wheel --outdir .tmp-dist
        python scripts/check_wheel_static.py .tmp-dist/*.whl
        python -m venv .tmp-wheel-venv
        .tmp-wheel-venv/bin/pip install .tmp-dist/*.whl
        .tmp-wheel-venv/bin/python -c "from pyruns.web.app import create_app; app=create_app(); print(app.title)"
